document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e;justify-self:end;width:100%;max-width:440px}\n.hero-quote{\n  background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));\n  border:1px solid var(--line);\n  padding:36px 32px 32px;\n  position:relative;\n}\n.hero-quote::before{\n  content:\"\";\n  position:absolute;left:0;top:32px;bottom:32px;width:2px;\n  background:linear-gradient(180deg, var(--gold), transparent);\n}\n.hero-quote-eye{\n  font-family:var(--sans);font-size:11px;letter-spacing:.28em;text-transform:uppercase;\n  color:var(--gold);margin-bottom:16px;font-weight:500;\n}\n.hero-quote-txt{\n  font-family:var(--serif);font-style:italic;\n  font-size:21px;line-height:1.45;color:var(--ink);\n  margin-bottom:20px;\n}\n.hero-quote-foot{display:flex;align-items:center;gap:12px}\n.hero-quote-avatar{\n  width:36px;height:36px;border-radius:50%;\n  background:linear-gradient(135deg, var(--gold-soft), var(--gold-deep));\n  display:grid;place-items:center;\n  font-family:var(--serif);font-weight:600;color:var(--bg);font-size:14px;\n}\n.hero-quote-name{font-size:13px;color:var(--ink-mute);font-weight:500}\n.hero-quote-recv{font-size:11.5px;color:var(--gold);letter-spacing:.06em;margin-top:2px}\n\n.hero-stars{\n  display:flex;align-items:center;gap:14px;\n  margin-top:22px;padding:14px 18px;\n  background:rgba(200,169,90,.04);border:1px solid var(--line);\n}\n.stars{display:inline-flex;gap:2px;color:var(--gold)}\n.hero-stars-txt{font-size:12.5px;color:var(--ink-mute);letter-spacing:.04em}\n.hero-stars-txt b{color:var(--ink);font-weight:600}\n\n/* ---------- METRICS STRIP ---------- */\n.metrics{\n  background:var(--bg-2);\n  padding:48px 0;\n  border-top:1px solid var(--line);\n  border-bottom:1px solid var(--line);\n}\n.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center}\n.metric-num{\n  font-family:var(--serif);font-size:clamp(34px,3.4vw,46px);\n  color:var(--gold);font-weight:500;letter-spacing:-.01em;line-height:1;\n}\n.metric-lbl{\n  font-size:11.5px;l ter;gap:12px;padding:6px 6px 14px;border-bottom:1px solid rgba(255,255,255,.05)}\n.wa-avatar{\n  width:42px;height:42px;border-radius:50%;\n  background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));\n  display:grid;place-items:center;\n  font-family:var(--serif);color:var(--bg);font-weight:600;\n}\n.wa-name{font-weight:600;font-size:14.5px}\n.wa-status{font-size:11.5px;color:#7CC97F;display:flex;align-items:center;gap:5px}\n.wa-status::before{content:\"\";width:6px;height:6px;border-radius:50%;background:#7CC97F}\n.wa-msgs{display:flex;flex-direction:column;gap:8px;padding:18px 4px 4px;min-height:340px}\n.wa-bubble{\n  max-width:84%;padding:9px 13px;\n  font-size:14px;line-height:1.4;\n  border-radius:14px;\n  position:relative;\n  animation:waIn .4s ease both;\n}\n.wa-them{\n  align-self:flex-start;\n  background:#1A2E45;color:var(--ink);\n  border-top-left-radius:4px;\n}\n.wa-me{\n  align-self:flex-end;\n  background:#0E5C3A;color:#E8FFE3;\n  border-top-right-radius:4px;\n}\n.wa-time{font-size:10px;color:rgba(255,255,255,.5);margin-left:8px;float:right;margin-top:6px}\n.wa-typing{\n  align-self:flex-start;background:#1A2E45;\n  padding:12px 16px;border-radius:14px;display:inline-flex;gap:4px;\n}\n.wa-typing span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45);animation:typ 1.2s infinite}\n.wa-typing span:nth-child(2){animation-delay:.15s}\n.wa-typing span:nth-child(3){animation-delay:.3s}\n@keyframes typ{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}\n@keyframes waIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}\n.wa-side h2{margin-bottom:18px}\n.wa-side ul{list-style:none;margin:24px 0 32px}\n.wa-side li{\n  padding:14px 0;border-bottom:1px solid var(--line);\n  display:flex;gap:14px;align-items:flex-start;\n  font-size:15px;color:var(--ink-mute);\n}\n.wa-side li svg{width:18px;height:18px;color:var(--gold);flex:0 0 18px;margin-top:3px}\n\n/* ---------- TESTIMONIALS ---------- */\n.tst-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:48px}\n.tst-card{\n  padding:36px 30px;\n  border:1px solid var(--line);\n  background:linear-gradient(180deg, rgba(200,169,90,.02), transparent);\n  position:relative;\n  transition:transform .25s, border-color .25s;\n}\n.tst-card:hover{transform:translateY(-4px);border-color:var(--line-strong)}\n.tst-card::before{\n  content:\"\\201C\";\n  position:absolute;top:8px;right:18px;\n  font-family:var(--serif);font-size:78px;\n  color:var(--gold);opacity:.18;line-height:1;\n}\n.tst-stars{color:var(--gold);font-size:14px;letter-spacing:2px;margin-bottom:18px}\n.tst-quote{font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.55;margin-bottom:24px;color:var(--ink)}\n.tst-recv{\n  background:rgba(200,169,90,.06);\n  border-left:2px solid var(--gold);\n  padding:12px 16px;margin-bottom:20px;\n}\n.tst-recv-lbl{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}\n.tst-recv-val{font-family:var(--serif);font-size:24px;color:var(--ink);font-weight:500;letter-spacing:-.01em}\n.tst-foot{display:flex;align-items:center;gap:12px;padding-top:18px;border-top:1px solid var(--line)}\n.tst-avatar{\n  width:38px;height:38px;border-radius:50%;\n  background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));\n  display:grid;place-items:center;color:var(--bg);font-weight:600;font-family:var(--serif);\n}\n.tst-meta-name{font-size:14px;font-weight:600;color:var(--ink)}\n.tst-meta-job{font-size:12px;color:var(--ink-dim);margin-top:1px}\n\n/* ---------- ABOUT ---------- */\n.about{background:var(--bg-2)}\n.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}\n.about-side h2{margin-bottom:24px}\n.about-side p{color:var(--ink-mute);margin-bottom:18px;font-size:15.5px;line-height:1.75}\n.about-pillars{display:grid;gap:0;border-top:1px solid var(--line)}\n.about-pillar{\n  padding:24px 0;border-bottom:1px solid var(--line);\n  display:grid;grid-template-columns:80px 1fr;gap:24px;align-items:start;\n}\n.about-pillar-num{font-family:var(--serif);font-size:34px;color:var(--gold);font-style:italic;line-height:1}\n.about-pillar h4{font-family:var(--sans);font-weight:600;font-size:15px;margin-bottom:6px;letter-spacing:-.005em}\n.about-pillar p{font-size:14px;color:var(--ink-mute);margin:0;line-height:1.6}\n\n/* ---------- WHO WE ARE / NOT ---------- */\n.who-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:48px;border:1px solid var(--line)}\n.who-col{padding:38px 36px}\n.who-col + .who-col{border-left:1px solid var(--line)}\n.who-col h3{\n  font-family:var(--sans);font-size:12px;letter-spacing:.24em;text-transform:uppercase;\n  color:var(--gold);font-weight:600;margin-bottom:24px;\n}\n.who-col.is-not h3{color:var(--ink-dim)}\n.who-col ul{list-style:none}\n.who-col li{\n  display:flex;gap:14px;align-items:flex-start;\n  padding:12px 0;font-size:15px;line-height:1.55;\n}\n.who-col.is-yes li{color:var(--ink)}\n.who-col.is-not li{color:var(--ink-dim);text-decoration:line-through;text-decoration-color:rgba(138,135,128,.4)}\n.who-col li svg{width:16px;height:16px;flex:0 0 16px;margin-top:4px;color:var(--gold)}\n.who-col.is-not li svg{color:var(--ink-dim)}\n\n/* ---------- HOW IT WORKS ---------- */\n.how-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:48px;position:relative}\n.how-step{padding:0 24px;position:relative}\n.how-step + .how-step{border-left:1px solid var(--line)}\n.how-num{\n  font-family:var(--serif);font-style:italic;\n  font-size:46px;color:var(--gold);line-height:1;\n  margin-bottom:18px;\n}\n.how-step h3{font-family:var(--sans);font-size:16px;font-weight:600;margin-bottom:8px;letter-spacing:-.005em}\n.how-step p{font-size:14px;color:var(--ink-mute);line-height:1.6}\n\n/* ---------- GUARANTEES ---------- */\n.guar{background:var(--bg-2)}\n.guar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px}\n.guar-card{\n  padding:32px 28px;\n  border:1px solid var(--line);\n  position:relative;\n  text-align:left;\n}\n.guar-card-icn{\n  width:48px;height:48px;\n  border:1px solid var(--line-strong);\n  display:grid;place-items:center;color:var(--gold);\n  margin-bottom:22px;\n}\n.guar-card-icn svg{width:22px;height:22px}\n.guar-card h3{font-family:var(--sans);font-size:16px;font-weight:600;margin-bottom:8px;letter-spacing:-.005em}\n.guar-card p{font-size:14px;color:var(--ink-mute);line-height:1.6}\n\n/* ---------- FAQ ---------- */\n.faq-list{max-width:820px;margin:48px auto 0;border-top:1px solid var(--line)}\n.faq-item{border-bottom:1px solid var(--line)}\n.faq-q{\n  width:100%;padding:24px 0;\n  display:flex;align-items:center;justify-content:space-between;gap:20px;\n  text-align:left;\n  font-family:var(--serif);font-size:18px;color:var(--ink);font-weight:500;\n  transition:color .2s;\n}\n.faq-q:hover{color:var(--gold)}\n.faq-arr{\n  width:32px;height:32px;border:1px solid var(--line-strong);border-radius:50%;\n  display:grid;place-items:center;flex:0 0 32px;\n  color:var(--gold);\n  transition:transform .35s cubic-bezier(.34,1.56,.64,1);\n}\n.faq-item[open] .faq-arr{transform:rotate(45deg)}\n.faq-arr svg{width:14px;height:14px}\n.faq-a{padding:0 0 28px;font-size:15px;color:var(--ink-mute);line-height:1.7;max-width:680px}\n\n/* ---------- FINAL CTA ---------- */\n.final{\n  padding:120px 0;\n  text-align:center;\n  background:\n    radial-gradient(900px 400px at 50% 0%, rgba(200,169,90,.10), transparent 60%),\n    var(--bg);\n}\n.final h2{margin:0 auto 22px}\n.final p{max-width:640px;margin:0 auto 40px;font-size:17px;color:var(--ink-mute);line-height:1.65}\n.btn-xl{\n  display:inline-flex;align-items:center;gap:14px;\n  background:var(--wa);color:#fff;\n  font-weight:600;font-size:17px;\n  padding:22px 38px;border-radius:999px;\n  box-shadow:0 18px 40px rgba(37,211,102,.32), inset 0 1px 0 rgba(255,255,255,.2);\n  transition:transform .2s, box-shadow .2s, background .2s;\n  position:relative;overflow:hidden;\n}\n.btn-xl::after{\n  content:\"\";position:absolute;inset:0;\n  background:linear-gradient(120deg, transparent 30%, rgba(255,255,255,.2) 50%, transparent 70%);\n  transform:translateX(-100%);\n  animation:shimmer 3.2s infinite;\n}\n@keyframes shimmer{0%{transform:translateX(-100%)}60%,100%{transform:translateX(100%)}}\n.btn-xl:hover{background:var(--wa-dark);transform:translateY(-2px);box-shadow:0 22px 50px rgba(37,211,102,.42)}\n.btn-xl svg{width:22px;height:22px;position:relative;z-index:2}\n.btn-xl span{position:relative;z-index:2}\n.final-note{margin-top:24px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}\n\n/* ---------- FOOTER ---------- */\nfooter{\n  background:var(--bg-2);\n  border-top:1px solid var(--line);\n  padding:64px 0 36px;\n}\n.ft-inner{max-width:var(--maxw);margin:0 auto;padding:0 24px;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:48px}\n.ft-brand{display:flex;align-items:center;gap:14px;margin-bottom:18px}\n.ft-mark{width:36px;height:36px;border:1px solid var(--line-strong);display:grid;place-items:center}\n.ft-mark svg{width:18px;height:18px}\n.ft-name{font-family:var(--display);font-size:18px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);font-weight:600}\n.ft-sub{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-top:4px;font-weight:500}\n.ft-text{color:var(--ink-mute);font-size:13.5px;line-height:1.65;max-width:340px}\n.ft-col h5{font-family:var(--sans);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:18px}\n.ft-col li{list-style:none;font-size:13.5px;color:var(--ink-mute);padding:6px 0}\n.ft-bottom{\n  max-width:var(--maxw);margin:48px auto 0;padding:24px 24px 0;\n  border-top:1px solid var(--line);\n  display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;\n  font-size:11.5px;letter-spacing:.06em;color:var(--ink-dim);\n}\n\n/* ---------- FLOATING WHATSAPP (desktop) ---------- */\n.float-wa{\n  position:fixed;right:24px;bottom:24px;z-index:50;\n  width:60px;height:60px;border-radius:50%;\n  background:var(--wa);color:#fff;\n  display:grid;place-items:center;\n  box-shadow:0 14px 36px rgba(37,211,102,.45);\n  transition:transform .2s;\n}\n.float-wa::before{\n  content:\"\";position:absolute;inset:-6px;border-radius:50%;\n  border:2px solid var(--wa);opacity:.5;animation:pulseRing 2s infinite;\n}\n@keyframes pulseRing{0%{transform:scale(.9);opacity:.7}100%{transform:scale(1.4);opacity:0}}\n.float-wa:hover{transform:scale(1.08)}\n.float-wa svg{width:28px;height:28px;position:relative;z-index:2}\n\n/* ---------- STICKY MOBILE BAR ---------- */\n.sticky-bar{\n  display:none;\n  position:fixed;left:0;right:0;bottom:0;z-index:55;\n  padding:10px 14px calc(10px + env(safe-area-inset-bottom));\n  background:rgba(13,27,46,.94);\n  backdrop-filter:blur(14px);\n  -webkit-backdrop-filter:blur(14px);\n  border-top:1px solid var(--line);\n}\n.sticky-bar a{\n  display:flex;align-items:center;justify-content:center;gap:10px;\n  background:var(--wa);color:#fff;font-weight:600;font-size:15px;\n  padding:14px 18px;border-radius:999px;\n  box-shadow:0 10px 26px rgba(37,211,102,.32);\n}\n.sticky-bar svg{width:18px;height:18px}\n\n/* ---------- SCROLL POPUP ---------- */\n.popup-bg{\n  position:fixed;inset:0;z-index:90;\n  background:rgba(8,15,28,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);\n  display:none;align-items:center;justify-content:center;padding:20px;\n  opacity:0;transition:opacity .25s;\n}\n.popup-bg.is-on{display:flex;opacity:1}\n.popup{\n  background:var(--bg-2);border:1px solid var(--line-strong);\n  padding:44px 36px 36px;max-width:460px;width:100%;\n  position:relative;text-align:center;\n  animation:popIn .35s cubic-bezier(.34,1.56,.64,1);\n}\n@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}\n.popup-close{\n  position:absolute;top:14px;right:14px;\n  width:32px;height:32px;border-radius:50%;\n  border:1px solid var(--line);color:var(--ink-mute);\n  display:grid;place-items:center;\n}\n.popup-close:hover{color:var(--gold);border-color:var(--gold)}\n.popup-eye{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;font-weight:500}\n.popup h3{font-family:var(--serif);font-size:26px;line-height:1.2;margin-bottom:14px;font-weight:500}\n.popup h3 em{font-style:italic;color:var(--gold)}\n.popup p{color:var(--ink-mute);font-size:15px;line-height:1.6;margin-bottom:26px}\n.popup .btn-wa{width:100%;justify-content:center}\n\n/* ---------- FLOATING NOTIFICATION (premium) ---------- */\n.fnote{\n  position:fixed;left:14px;bottom:96px;z-index:52;\n  width:min(320px, calc(100vw - 28px));\n  background:rgba(13,13,13,.86);\n  -webkit-backdrop-filter:blur(14px) saturate(120%);\n  backdrop-filter:blur(14px) saturate(120%);\n  border:1px solid rgba(200,169,90,.22);\n  border-radius:18px;\n  padding:14px 14px 14px 16px;\n  box-shadow:0 18px 40px -10px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.02) inset;\n  color:#fff;\n  opacity:0;transform:translateY(14px);pointer-events:none;\n  transition:opacity .55s ease, transform .55s cubic-bezier(.2,.8,.2,1);\n  will-change:opacity,transform;\n}\n.fnote.is-on{opacity:1;transform:translateY(0);pointer-events:auto}\n.fnote-top{display:flex;align-items:center;gap:8px;font-size:11.5px;letter-spacing:.04em;color:#cfcfcf;margin-bottom:8px}\n.fnote-dot{width:8px;height:8px;border-radius:50%;background:#34d27d;box-shadow:0 0 0 0 rgba(52,210,125,.55);animation:pulse 2.4s infinite;flex:0 0 8px}\n.fnote-msg{font-size:13.5px;line-height:1.45;color:#f5f5f5;margin-bottom:12px;padding-right:18px}\n.fnote-cta{\n  display:flex;align-items:center;justify-content:center;gap:8px;\n  width:100%;background:#1FA855;color:#fff;\n  font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;\n  padding:12px 14px;border-radius:12px;min-height:46px;\n  transition:background .2s, transform .12s;\n}\n.fnote-cta:hover{background:#25D366}\n.fnote-cta:active{transform:scale(.98)}\n.fnote-cta svg{width:16px;height:16px}\n.fnote-x{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;color:#9a9a9a;font-size:14px;line-height:1;display:grid;place-items:center;transition:color .2s}\n.fnote-x:hover{color:#fff}\n\n/* ---------- REVEAL ---------- */\n.rv{opacity:0;transform:translateY(18px);transition:opacity .8s ease, transform .8s ease}\n.rv.is-in{opacity:1;transform:translateY(0)}\n\n/* ---------- RESPONSIVE ---------- */\n@media (max-width: 980px){\n  .hero-inner{grid-template-columns:1fr;gap:48px}\n  .hero-art{justify-self:start;max-width:100%}\n  .wa-section{grid-template-columns:1fr;gap:48px}\n  .about-grid{grid-template-columns:1fr;gap:40px}\n  .tst-grid{grid-template-columns:1fr 1fr}\n  .how-grid{grid-template-columns:1fr 1fr;gap:0}\n  .how-step{padding:24px 24px}\n  .how-step:nth-child(2){border-left:1px solid var(--line)}\n  .how-step:nth-child(3),.how-step:nth-child(4){border-top:1px solid var(--line)}\n  .how-step:nth-child(3){border-left:0}\n  .wait-grid{grid-template-columns:1fr 1fr}\n  .ft-inner{grid-template-columns:1fr 1fr;gap:36px}\n}\n\n/* ===== MOBILE-FIRST POLISH (<= 720px) ===== */\n@media (max-width: 720px){\n  body{font-size:15.5px;padding-bottom:88px}\n  .wrap{padding:0 20px}\n  .section{padding:64px 0}\n  .section + .section{border-top:1px solid var(--line)}\n\n  /* Top bar — keep it slim, single line */\n  .topbar{font-size:11px;letter-spacing:.04em;padding:8px 14px;line-height:1.4}\n  .topbar strong{font-size:10.5px;letter-spacing:.14em;display:block;margin-bottom:2px}\n\n  /* Header — compact, sticky, premium */\n  .hdr-inner{padding:12px 18px;gap:12px}\n  .brand{gap:10px;min-width:0}\n  .brand-mark{width:36px;height:36px}\n  .brand-mark svg{width:18px;height:18px}\n  .brand-name{font-size:17px;letter-spacing:.16em}\n  .bran ssList.add('is-on');\n  }\n  function maybe(){\n    if(shown) return;\n    const elapsed = Date.now() - start;\n    if(elapsed < 10000) return;\n    const h = document.documentElement;\n    const max = h.scrollHeight - h.clientHeight;\n    const pct = max > 0 ? h.scrollTop / max : 0;\n    if(pct >= 0.35) show();\n  }\n  window.addEventListener('scroll', maybe, {passive:true});\n  setTimeout(maybe, 10100);\n  if(x) x.addEventListener('click', dismiss);\n  if(cta) cta.addEventListener('click', dismiss);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
